spring.application.name=Chapter01

# 애플리케이션 타입을 설정한다.
spring.main.web-application-type = none

# 배너를 설정한다. 
spring.main.banner-mode=console
spring.banner.location=banners/banner.txt

#서버의 포트를 설정한다. (포트가 0이면 랜덤하게 포트 번호가 활당된다.)
server.port = 8080

#로그설정(Spring이 출력하는 모든 로그를 DEBUG 이상이면 모두 보여줘라)
logging.level.org.springframework=debug